<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>JkpgCity Venues</title>
  </head>
  <body>
    <container>
      <h1>Jönköping City</h1>
    </container>
    <h2>Venues</h2>
    <div id="list"></div>

    <script>
      async function loadVenues() {
        const res = await fetch("http://localhost:3000/api/venues");
        const venues = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        venues.forEach((v) => {
          const div = document.createElement("div");
          div.innerHTML = `
          <h3>${v.name}</h3>
          <p>${v.category || ""}</p>
          <p>${v.address || ""}</p>
          <hr/>
        `;
          list.appendChild(div);
        });
      }

      loadVenues();
    </script>

    <h2>Add Venue</h2>

    <input id="name" placeholder="Name" />
    <input id="category" placeholder="Category" />
    <input id="address" placeholder="Address" />
    <input id="website" placeholder="Website" />
    <button onclick="addVenue()">Add</button>

    <hr />
  </body>
</html>
