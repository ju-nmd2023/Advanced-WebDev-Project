<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jönköping City Guide</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>
      <span>Jönköping City Guide</span>
    </h1>
    <div class="hero"></div>
    <h2>Categories</h2>

    <div class="category-buttons">
      <button
        class="category-btn"
        data-category=""
        onclick="filterCategory('', this)"
      >
        All
      </button>

      <button
        class="category-btn"
        data-category="Restaurant"
        onclick="filterCategory('Restaurant', this)"
      >
        Restaurant
      </button>
      <button
        class="category-btn"
        data-category="Bar"
        onclick="filterCategory('Bar', this)"
      >
        Bar
      </button>
      <button
        class="category-btn"
        data-category="Hotel"
        onclick="filterCategory('Hotel', this)"
      >
        Hotel
      </button>
      <button
        class="category-btn"
        data-category="Shopping"
        onclick="filterCategory('Shopping', this)"
      >
        Shopping
      </button>

      <button
        class="category-btn extra-category"
        data-category="Activity"
        onclick="filterCategory('Activity', this)"
      >
        Activity
      </button>
      <button
        class="category-btn extra-category"
        data-category="School"
        onclick="filterCategory('School', this)"
      >
        School
      </button>
      <button
        class="category-btn extra-category"
        data-category="Café"
        onclick="filterCategory('Café', this)"
      >
        Café
      </button>
      <button
        class="category-btn extra-category"
        data-category="Sports"
        onclick="filterCategory('Sports', this)"
      >
        Sports
      </button>
      <button
        class="category-btn extra-category"
        data-category="Transportation"
        onclick="filterCategory('Transportation', this)"
      >
        Transportation
      </button>
      <button
        class="category-btn extra-category"
        data-category="Healthcare"
        onclick="filterCategory('Healthcare', this)"
      >
        Healthcare
      </button>
      <button
        class="category-btn extra-category"
        data-category="Park"
        onclick="filterCategory('Park', this)"
      >
        Park
      </button>
      <button
        class="category-btn extra-category"
        data-category="Nightlife"
        onclick="filterCategory('Nightlife', this)"
      >
        Nightlife
      </button>
      <button
        class="category-btn extra-category"
        data-category="Museum"
        onclick="filterCategory('Museum', this)"
      >
        Museum
      </button>
    </div>

    <hr />

    <div class="top-controls">
      <div class="search-sort">
        <h2>Search locations:</h2>

        <input
          id="searchInput"
          placeholder="Type here..."
          onkeyup="searchVenues()"
        />

        <label class="open-now">
          <input type="checkbox" id="filterOpenNow" />
          <span>Open now</span>
        </label>
      </div>

      <div class="filters">
        <h2>Filters:</h2>

        <select id="filterLocation">
          <option value="">All Locations</option>
          <option value="Centrum">Centrum</option>
          <option value="Torpa">Torpa</option>
          <option value="Söder">Söder</option>
          <option value="Väster">Väster</option>
          <option value="Öster">Öster</option>
          <option value="Kålgården">Kålgården</option>
          <option value="Bäckalyckan">Bäckalyckan</option>
          <option value="Huskvarna">Huskvarna</option>
          <option value="Råslätt">Råslätt</option>
        </select>

        <select id="filterCategory">
          <option value="">All Categories</option>
          <option value="Restaurant">Restaurant</option>
          <option value="Bar">Bar</option>
          <option value="Hotel">Hotel</option>
          <option value="Shopping">Shopping</option>
          <option value="Activity">Activity</option>
          <option value="School">School</option>
          <option value="Café">Café</option>
          <option value="Sports">Sports</option>
          <option value="Transportation">Transportation</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Park">Park</option>
          <option value="Nightlife">Nightlife</option>
          <option value="Museum">Museum</option>
        </select>

        <button onclick="applyFilters()">Apply</button>
      </div>
    </div>

    <hr />

    <div id="list" class="venue-grid"></div>

    <hr />

    <div id="addVenueSection">
      <h2>Add Venue</h2>

      <div class="add-venue-form">
        <input id="name" placeholder="Name" />

        <select id="category">
          <option value="Restaurant">Restaurant</option>
          <option value="Bar">Bar</option>
          <option value="Hotel">Hotel</option>
          <option value="Shopping">Shopping</option>
          <option value="Activity">Activity</option>
          <option value="School">School</option>
          <option value="Café">Café</option>
          <option value="Sports">Sports</option>
          <option value="Transportation">Transportation</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Park">Park</option>
          <option value="Nightlife">Nightlife</option>
          <option value="Museum">Museum</option>
        </select>

        <select id="location">
          <option value="Centrum">Centrum</option>
          <option value="Torpa">Torpa</option>
          <option value="Söder">Söder</option>
          <option value="Väster">Väster</option>
          <option value="Öster">Öster</option>
          <option value="Kålgården">Kålgården</option>
          <option value="Bäckalyckan">Bäckalyckan</option>
          <option value="Huskvarna">Huskvarna</option>
          <option value="Råslätt">Råslätt</option>
        </select>

        <input id="address" placeholder="Address" />
        <input id="website" placeholder="Website" />

        <input id="rating" type="number" min="1" max="5" placeholder="Rating" />

        <input id="open" placeholder="Opening time (10:00)" />
        <input id="close" placeholder="Closing time (23:00)" />

        <input id="maps_link" placeholder="Google Maps link" />

        <button onclick="addVenue()">Add</button>
      </div>
    </div>
    <script src="main.js"></script>
  </body>
  <footer class="footer">
    <p>Jönköping City Guide © 2026</p>

    <p>
      <a id="developerLink" href="login.html">Developer</a>
    </p>
  </footer>

  <script src="main.js"></script>
</html>
