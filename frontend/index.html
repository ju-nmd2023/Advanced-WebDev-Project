<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jönköping City Guide</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Jönköping City Guide</h1>
    <div class="hero"></div>
    <h2>Categories</h2>

    <div class="category-buttons">
      <button onclick="filterCategory('')">All</button>

      <button onclick="filterCategory('Restaurant')">Restaurant</button>
      <button onclick="filterCategory('Bar')">Bar</button>
      <button onclick="filterCategory('Hotel')">Hotel</button>
      <button onclick="filterCategory('Shopping')">Shopping</button>
      <button onclick="filterCategory('Activity')">Activity</button>
      <button onclick="filterCategory('School')">School</button>
      <button onclick="filterCategory('Café')">Café</button>
      <button onclick="filterCategory('Sports')">Sports</button>
      <button onclick="filterCategory('Transportation')">Transportation</button>
      <button onclick="filterCategory('Healthcare')">Healthcare</button>
      <button onclick="filterCategory('Park')">Park</button>
      <button onclick="filterCategory('Nightlife')">Nightlife</button>
      <button onclick="filterCategory('Museum')">Museum</button>
    </div>

    <hr />

    <div class="top-controls">
      <div class="search-sort">
        <h2>Search & Sort</h2>

        <input
          id="searchInput"
          placeholder="Search venues..."
          onkeyup="searchVenues()"
        />

        <select id="sortSelect" onchange="sortVenues()">
          <option value="">Sort</option>
          <option value="rating">Rating</option>
          <option value="name">Name (A-Z)</option>
        </select>
      </div>

      <div class="filters">
        <h2>Filters</h2>

        <select id="filterLocation">
          <option value="">All Locations</option>
          <option value="Centrum">Centrum</option>
          <option value="Torpa">Torpa</option>
          <option value="Söder">Söder</option>
          <option value="Väster">Väster</option>
          <option value="Öster">Öster</option>
          <option value="Kålgården">Kålgården</option>
          <option value="Bäckalyckan">Bäckalyckan</option>
          <option value="Huskvarna">Huskvarna</option>
          <option value="Råslätt">Råslätt</option>
        </select>

        <select id="filterCategory">
          <option value="">All Categories</option>
          <option value="Restaurant">Restaurant</option>
          <option value="Bar">Bar</option>
          <option value="Hotel">Hotel</option>
          <option value="Shopping">Shopping</option>
          <option value="Activity">Activity</option>
          <option value="School">School</option>
          <option value="Café">Café</option>
          <option value="Sports">Sports</option>
          <option value="Transportation">Transportation</option>
          <option value="Healthcare">Healthcare</option>
          <option value="Park">Park</option>
          <option value="Nightlife">Nightlife</option>
          <option value="Museum">Museum</option>
        </select>

        <label>
          <input type="checkbox" id="filterOpenNow" />
          Open now
        </label>

        <button onclick="applyFilters()">Apply</button>
      </div>
    </div>

    <hr />

    <div id="list" class="venue-grid"></div>

    <hr />

    <h2>Add Venue</h2>

    <div class="add-venue-form">
      <input id="name" placeholder="Name" />

      <select id="category">
        <option value="Restaurant">Restaurant</option>
        <option value="Bar">Bar</option>
        <option value="Hotel">Hotel</option>
        <option value="Shopping">Shopping</option>
        <option value="Activity">Activity</option>
        <option value="School">School</option>
        <option value="Café">Café</option>
        <option value="Sports">Sports</option>
        <option value="Transportation">Transportation</option>
        <option value="Healthcare">Healthcare</option>
        <option value="Park">Park</option>
        <option value="Nightlife">Nightlife</option>
        <option value="Museum">Museum</option>
      </select>

      <select id="location">
        <option value="Centrum">Centrum</option>
        <option value="Torpa">Torpa</option>
        <option value="Söder">Söder</option>
        <option value="Väster">Väster</option>
        <option value="Öster">Öster</option>
        <option value="Kålgården">Kålgården</option>
        <option value="Bäckalyckan">Bäckalyckan</option>
        <option value="Huskvarna">Huskvarna</option>
        <option value="Råslätt">Råslätt</option>
      </select>

      <input id="address" placeholder="Address" />
      <input id="website" placeholder="Website" />

      <input id="rating" type="number" min="1" max="5" placeholder="Rating" />

      <input id="open" placeholder="Opening time (10:00)" />
      <input id="close" placeholder="Closing time (23:00)" />

      <input id="maps_link" placeholder="Google Maps link" />

      <button onclick="addVenue()">Add</button>
    </div>

    <script src="main.js"></script>
  </body>
</html>
