<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jönköping City Guide</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Jönköping City Guide</h1>

    <h2>Categories</h2>

    <button onclick="filterCategory('')">All</button>
    <button onclick="filterCategory('restaurant')">Restaurants</button>
    <button onclick="filterCategory('cafe')">Cafés</button>
    <button onclick="filterCategory('bar')">Bars</button>
    <button onclick="filterCategory('venue')">Venues</button>

    <hr />

    <div class="top-controls">
      <div class="search-sort">
        <h2>Search & Sort</h2>

        <input
          id="searchInput"
          placeholder="Search venues..."
          onkeyup="searchVenues()"
        />

        <select id="sortSelect" onchange="sortVenues()">
          <option value="">Sort</option>
          <option value="rating">Rating</option>
          <option value="name">Name (A-Z)</option>
        </select>
      </div>

      <div class="filters">
        <h2>Filters</h2>

        <select id="filterLocation">
          <option value="">All Locations</option>
          <option value="centrum">Centrum</option>
          <option value="torpa">Torpa</option>
          <option value="huskvarna">Huskvarna</option>
        </select>

        <label>
          <input type="checkbox" id="filterOpenNow" />
          Open now
        </label>

        <button onclick="applyFilters()">Apply</button>
      </div>
    </div>

    <hr />

    <div id="list" class="venue-grid"></div>

    <hr />

    <h2>Add Venue</h2>

    <div class="add-venue-form">
      <input id="name" placeholder="Name" />

      <select id="category">
        <option value="restaurant">Restaurant</option>
        <option value="cafe">Cafe</option>
        <option value="bar">Bar</option>
        <option value="venue">Venue</option>
      </select>

      <select id="location">
        <option value="centrum">Centrum</option>
        <option value="torpa">Torpa</option>
        <option value="huskvarna">Huskvarna</option>
      </select>

      <input id="address" placeholder="Address" />
      <input id="website" placeholder="Website" />

      <input id="rating" type="number" min="1" max="5" placeholder="Rating" />

      <input id="open" placeholder="Opening time (10:00)" />
      <input id="close" placeholder="Closing time (23:00)" />

      <input id="maps_link" placeholder="Google Maps link" />

      <button onclick="addVenue()">Add</button>
    </div>

    <script src="main.js"></script>
  </body>
</html>
