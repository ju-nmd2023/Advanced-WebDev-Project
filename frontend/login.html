<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Login</h1>

    <div class="login-box">

    </div>

    <script src="login.js"></script>
  </body>
</html>
